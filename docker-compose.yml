version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - ENV=production
    volumes:
      # Persist simulation history between restarts
      - ./backend/memory/simulation_log.json:/app/memory/simulation_log.json
      # Persist ChromaDB between restarts (optional — comment out to re-ingest each time)
      - ./backend/rag/chroma_db:/app/rag/chroma_db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: agentnation-net
